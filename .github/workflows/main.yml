name: Build
on: [push, pull_request]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build with meson
        run: |
          pip install meson
          pip install ninja
          
          meson setup build
          meson compile -C build
#          ./build/examples/smiley.exe

      - uses: actions/upload-artifact@v4
        with:
          name: svg2png-windows
          path: ./build/examples/smiley.exe
          
      - name: Build with cmake
        run: |
          cmake .
          cmake --build .
          ./examples/Debug/smiley.exe
          
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build with meson
        run: |
          pip install meson
          pip install ninja
          
          meson setup build
          meson compile -C build
          ./build/examples/smiley

      - name: Build with cmake
        run: |
          cmake .
          cmake --build .
          ./build/examples/smiley
          
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build with meson
        run: |
          pip install meson
          pip install ninja
          
          meson setup build
          meson compile -C build
          ./build/examples/smiley

      - name: Build with cmake
        run: |
          cmake .
          cmake --build .
          ./build/examples/smiley
